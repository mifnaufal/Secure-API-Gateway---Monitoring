name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  NODE_VERSION: '18'
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres_password
  POSTGRES_DB: secure_gateway_test
  REDIS_HOST: localhost
  REDIS_PORT: 6379
  REDIS_PASSWORD: redis_password
  JWT_SECRET: test-jwt-secret
  DB_HOST: localhost
  DB_PORT: 5432
  DB_NAME: secure_gateway_test
  DB_USER: postgres
  DB_PASSWORD: postgres_password

jobs:
  # Test all services
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      matrix:
        service: [gateway, auth-service, data-service, monitoring-service]
        include:
          - service: gateway
            dir: gateway
          - service: auth-service
            dir: services/auth
          - service: data-service
            dir: services/data
          - service: monitoring-service
            dir: monitoring

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        working-directory: ${{ matrix.dir }}
        run: npm ci

      - name: Run tests
        working-directory: ${{ matrix.dir }}
        run: npm test || true
        env:
          AUTH_SERVICE_URL: http://localhost:3001
          DATA_SERVICE_URL: http://localhost:3002
          MONITORING_SERVICE_URL: http://localhost:3003

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.service }}
          path: ${{ matrix.dir }}/coverage/
          retention-days: 7

  # Code quality checks
  lint:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check for security vulnerabilities
        run: npm audit --production || true

      - name: Verify package.json
        run: |
          for dir in gateway services/auth services/data monitoring; do
            echo "Checking $dir..."
            cd $dir
            npm ls || true
            cd ..
          done

  # Build Docker images
  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Gateway
        uses: docker/build-push-action@v5
        with:
          context: ./gateway
          push: false
          load: true
          tags: secure-gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Auth Service
        uses: docker/build-push-action@v5
        with:
          context: ./services/auth
          push: false
          load: true
          tags: auth-service:latest
          cache-from: type=gha

      - name: Build Data Service
        uses: docker/build-push-action@v5
        with:
          context: ./services/data
          push: false
          load: true
          tags: data-service:latest
          cache-from: type=gha

      - name: Build Monitoring Service
        uses: docker/build-push-action@v5
        with:
          context: ./monitoring
          push: false
          load: true
          tags: monitoring-service:latest
          cache-from: type=gha

      - name: Test Docker Compose
        run: |
          docker compose up -d
          sleep 10
          docker compose ps
          docker compose logs

      - name: Health check
        run: |
          sleep 15
          curl -f http://localhost:3000/health || echo "Gateway not ready"
          curl -f http://localhost:3001/health || echo "Auth not ready"
          curl -f http://localhost:3002/health || echo "Data not ready"
          curl -f http://localhost:3003/health || echo "Monitoring not ready"

  # Deploy (only on main branch)
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production
      url: ${{ vars.DEPLOY_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/secure-api-gateway
            git pull origin main
            docker compose down
            docker compose up -d --build
            docker system prune -f

      - name: Notify deployment success
        if: success()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "✅ Deployment successful!\nRepository: ${{ github.repository }}\nBranch: ${{ github.ref }}\nCommit: ${{ github.sha }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
